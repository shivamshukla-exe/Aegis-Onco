<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AegisOnco Command Center</title>
    <!--
      GitHub Pages SPA fallback (standard technique, see
      https://github.com/rafgraph/spa-github-pages).
      GitHub Pages serves this file for any unknown path (e.g. a deep link or
      a hard refresh on /Aegis-Onco/registry). It re-encodes the intended
      path into a query string and redirects to index.html, which then
      restores the real URL via history.replaceState so React Router can
      render the correct page.
    -->
    <script>
      var pathSegmentsToKeep = 1; // keep "/Aegis-Onco"
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
